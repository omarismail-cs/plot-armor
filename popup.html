<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Plot Armor</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f1115;
        --panel: #171a21;
        --panel-2: #1d212b;
        --text: #f3f5f7;
        --muted: #a2a8b3;
        --accent: #7c8cff;
        --accent-2: #6273ff;
        --border: #2b3240;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 340px;
        padding: 16px;
        background: radial-gradient(circle at top, #171b24, var(--bg) 58%);
        color: var(--text);
        font-family: Inter, Segoe UI, Arial, sans-serif;
      }

      .card {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(0, 0, 0, 0.04));
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 18px;
        font-weight: 700;
      }

      .subtitle {
        margin: 0 0 14px;
        color: var(--muted);
        font-size: 12px;
      }

      .input-row {
        display: flex;
        gap: 8px;
      }
      .input-wrap {
        position: relative;
        flex: 1;
      }

      input[type="text"] {
        width: 100%;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        outline: none;
      }

      input[type="text"]::placeholder {
        color: #7b8494;
      }

      input[type="text"]:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(124, 140, 255, 0.2);
      }

      button {
        border: 0;
        border-radius: 10px;
        background: linear-gradient(180deg, var(--accent), var(--accent-2));
        color: #ffffff;
        font-weight: 600;
        padding: 0 14px;
        cursor: pointer;
      }

      button:hover {
        filter: brightness(1.08);
      }

      .suggestions {
        position: absolute;
        top: calc(100% + 6px);
        left: 0;
        right: 0;
        margin: 0;
        padding: 0;
        list-style: none;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--panel);
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.35);
        max-height: 220px;
        overflow-y: auto;
        z-index: 20;
      }
      .suggestions.hidden {
        display: none;
      }
      .suggestion-item {
        padding: 8px 10px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        cursor: pointer;
      }
      .suggestion-item:last-child {
        border-bottom: 0;
      }
      .suggestion-item:hover {
        background: rgba(124, 140, 255, 0.14);
      }
      .suggestion-title {
        font-size: 13px;
        font-weight: 600;
      }
      .suggestion-meta {
        font-size: 11px;
        color: var(--muted);
        margin-top: 2px;
      }

      h2 {
        margin: 16px 0 8px;
        font-size: 13px;
        letter-spacing: 0.2px;
        color: var(--muted);
        font-weight: 600;
      }

      ul {
        margin: 0;
        padding: 0;
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 6px;
        max-height: 180px;
        overflow-y: auto;
      }

      li {
        padding: 8px 10px;
        border-radius: 9px;
        border: 1px solid var(--border);
        background: var(--panel-2);
        font-size: 13px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .show-name {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .remove-btn {
        background: transparent;
        border: 1px solid #4a5263;
        color: var(--muted);
        border-radius: 7px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.2px;
        padding: 3px 8px;
      }

      .remove-btn:hover {
        color: #ffb0b0;
        border-color: #a35757;
        background: rgba(163, 87, 87, 0.15);
      }

      .empty {
        color: var(--muted);
        font-size: 13px;
        margin: 0;
      }

      @keyframes pa-spin {
        to { transform: rotate(360deg); }
      }

      .show-status {
        flex-shrink: 0;
        width: 18px;
        height: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .show-status.status-loading::after {
        content: "";
        width: 13px;
        height: 13px;
        border: 2px solid rgba(124, 140, 255, 0.25);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: pa-spin 0.65s linear infinite;
        display: block;
      }

      .show-status.status-success::after {
        content: "✓";
        color: #6fcf97;
        font-size: 14px;
        font-weight: 700;
      }

      .show-status.status-error {
        background: rgba(235, 87, 87, 0.15);
        border: 1px solid rgba(235, 87, 87, 0.4);
        border-radius: 50%;
        cursor: default;
        font-size: 10px;
        font-weight: 700;
        color: #eb5757;
      }

      .show-status.status-error::after {
        content: "!";
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Plot Armor</h1>
      <p class="subtitle">Protect yourself from spoilers.</p>

      <div class="input-row">
        <div class="input-wrap">
          <input id="showInput" type="text" placeholder="Add a show to protect" autocomplete="off" />
          <ul id="suggestions" class="suggestions hidden"></ul>
        </div>
        <button id="addBtn" type="button">Add</button>
      </div>

      <h2>Currently Protected Shows</h2>
      <p id="emptyState" class="empty">No protected shows yet.</p>
      <ul id="showList"></ul>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
